document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

4-858d-84e6d4610f19\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ab4e7539-f99e-487a-8113-90bed130f6e3\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3e26d044-341d-48f5-a151-3ac8842f0d9b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d4e02255-eb90-44c1-84ef-757362623478\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8ca38b8f-88f9-45ba-ae6c-76b1dacb72e3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ═══════════════════════════════════════════════════════════════\n   LE RUBIS STELLAIRE — Flat military / control screen\n   red · blue · black · white · high contrast · no glass, no gradient\n   min font size 14px everywhere\n   ═══════════════════════════════════════════════════════════════ */\n\n:root {\n  --bg:         #0B0F14;          /* near-black navy */\n  --bg-2:       #0E141B;\n  --panel:      #12191F;\n  --panel-2:    #0A1118;\n  --ink:        #F2F4F7;          /* white */\n  --ink-soft:   #BFC7D1;\n  --ink-mute:   #7B8794;\n  --ink-faint:  #3E4A57;\n  --rule:       #1F2A35;\n  --rule-s:     #152029;\n\n  --red:        #E10F1E;\n  --red-hot:    #FF2A3A;\n  --red-deep:   #7A0711;\n  --blue:       #2F6BE0;\n  --blue-hot:   #4A86FF;\n  --cyan:       #45B3C8;\n  --amber:      #F4B740;\n\n  --f-d: \"Archivo\", \"Helvetica Neue\", Arial, sans-serif;\n  --f-m: \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n  --f-s: \"Instrument Serif\", \"Times New Roman\", serif;\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nhtml {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--f-d);\n  font-size: 16px;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nbody {\n  min-height: 100vh;\n  overflow-x: hidden;\n  position: relative;\n  line-height: 1.4;\n  background:\n    linear-gradient(var(--rule-s) 1px, transparent 1px) 0 0 / 100% 32px,\n    linear-gradient(90deg, var(--rule-s) 1px, transparent 1px) 0 0 / 32px 100%,\n    var(--bg);\n}\nem { font-family: var(--f-s); font-style: italic; font-weight: 400; letter-spacing: -.005em; }\n\n/* hide flashy background blobs entirely */\n.bg, .bg-blob, .bg-noise { display: none !important; }\n\n/* All .glass → flat panel with crisp stroke */\n.glass {\n  background: var(--panel);\n  border: 1px solid var(--rule);\n  backdrop-filter: none !important;\n  -webkit-backdrop-filter: none !important;\n  box-shadow: none;\n  border-radius: 0;\n  position: relative;\n}\n.glass::before {\n  content: \"\";\n  position: absolute; inset: 4px;\n  border: 1px solid var(--rule-s);\n  pointer-events: none;\n}\n\n/* ═══════════ SCROLL PROGRESS + STICKY CTA ═══════════ */\nhtml { scrollbar-width: none; -ms-overflow-style: none; }\nhtml::-webkit-scrollbar { display: none; width: 0; height: 0; }\nbody::-webkit-scrollbar { display: none; }\n\n.scroll-progress {\n  position: fixed;\n  top: 0; left: 0; right: 0;\n  height: 2px;\n  background: var(--rule);\n  z-index: 200;\n  pointer-events: none;\n}\n.sp-bar {\n  height: 100%;\n  width: 100%;\n  background: var(--red);\n  transform-origin: left center;\n  transform: scaleX(0);\n  box-shadow: 0 0 8px var(--red);\n  transition: transform .08s linear;\n}\n\n.sticky-cta {\n  display: none;\n  position: fixed;\n  bottom: 20px; left: 20px; right: 20px;\n  z-index: 190;\n  padding: 16px 22px;\n  background: var(--red);\n  color: #fff;\n  font-family: var(--f-d);\n  font-size: 16px;\n  font-weight: 800;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  text-decoration: none;\n  text-align: center;\n  border: 1px solid var(--red);\n  box-shadow: 0 8px 24px rgba(0, 0, 0, .6);\n  transition: transform .25s ease, opacity .25s ease;\n  align-items: center; justify-content: center; gap: 12px;\n}\n.sticky-cta .arr { font-family: var(--f-m); }\n.sticky-cta.hide { transform: translateY(130%); opacity: 0; pointer-events: none; }\n@media (max-width: 900px) { .sticky-cta { display: inline-flex; } }\n\n/* ═══════════ TOP BAR ═══════════ */\n.topbar {\n  position: sticky; top: 0; z-index: 180;\n  overflow: hidden;\n  background: var(--red);\n  border: 0;\n  border-bottom: 2px solid var(--bg);\n  box-shadow: none;\n  backdrop-filter: none !important;\n  -webkit-backdrop-filter: none !important;\n}\n.tb-track {\n  display: flex; gap: 24px;\n  padding: 8px 0;\n  white-space: nowrap;\n  animation: mq 70s linear infinite;\n  font-family: var(--f-m);\n  font-size: 14px;\n  letter-spacing: .15em;\n  color: #fff;\n  font-weight: 700;\n  text-transform: uppercase;\n}\n.tb-track i { color: #000; font-style: normal; }\n@keyframes mq { from {transform: translateX(0)} to {transform: translateX(-50%)} }\n\n/* ═══════════ NAV ═══════════ */\n.nav {\n  position: sticky; top: 34px; z-index: 170;\n  margin: 0 auto;\n  max-width: none;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  padding: 14px 28px;\n  border-radius: 0;\n  width: 100%;\n  background: var(--panel-2);\n  border: 0;\n  border-bottom: 1px solid var(--rule);\n}\n.nav::before { display: none; }\n.nav-brand {\n  display: flex; align-items: center; gap: 12px;\n  color: var(--ink);\n  text-decoration: none;\n  font-weight: 900;\n  font-size: 14px;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n}\n.nav-mark { width: 22px; height: 22px; color: var(--red); }\n.nav-links { display: flex; align-items: center; gap: 26px; }\n.nav-links a {\n  color: var(--ink-soft);\n  text-decoration: none;\n  font-size: 14px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  font-weight: 600;\n  transition: color .12s;\n}\n.nav-links a:hover { color: var(--red-hot); }\n.nav-cta {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 8px 14px;\n  border-radius: 0;\n  background: var(--red);\n  color: #fff !important;\n  font-weight: 800;\n  font-size: 14px;\n  letter-spacing: .08em;\n  border: 1px solid var(--red);\n}\n.nav-cta:hover { background: #fff; color: var(--red) !important; }\n.nav-cta .arr { font-family: var(--f-m); }\n.nav-cta.alt {\n  background: transparent;\n  color: var(--ink) !important;\n  border: 1px solid var(--ink-faint);\n}\n.nav-cta.alt:hover { background: var(--ink); color: var(--bg) !important; border-color: var(--ink); }\n\n/* ═══════════ BUTTONS ═══════════ */\n.btn {\n  display: inline-flex; align-items: center; gap: 14px;\n  padding: 14px 22px;\n  border-radius: 0;\n  font-family: var(--f-d);\n  font-size: 15px;\n  font-weight: 800;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  text-decoration: none;\n  cursor: pointer;\n  transition: background .15s, color .15s, border-color .15s;\n  border: 1px solid transparent;\n}\n.btn .arr { font-family: var(--f-m); }\n.btn.primary {\n  background: var(--red);\n  color: #fff;\n  border-color: var(--red);\n  box-shadow: none;\n}\n.btn.primary:hover { background: #fff; color: var(--red); }\n.btn.ghost {\n  background: transparent;\n  color: var(--ink);\n  border-color: var(--ink-faint);\n}\n.btn.ghost:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }\n.btn.big { padding: 16px 26px; font-size: 16px; }\n\n/* ═══════════ HERO ═══════════ */\n.hero {\n  position: relative;\n  padding: 64px 28px 80px;\n  max-width: 1400px;\n  margin: 0 auto;\n  overflow: visible;\n  border-bottom: 1px solid var(--rule);\n}\n.hero-inner { max-width: 760px; position: relative; z-index: 2; }\n\n/* Hide floating sigils — too ornamental */\n.fs { display: none; }\n\n.pill {\n  display: inline-flex;\n  align-items: center; gap: 10px;\n  padding: 8px 14px;\n  border-radius: 0;\n  font-family: var(--f-m);\n  font-size: 14px;\n  letter-spacing: .15em;\n  font-weight: 700;\n  text-transform: uppercase;\n  color: var(--ink);\n  background: var(--panel);\n  border: 1px solid var(--rule);\n  margin-bottom: 28px;\n}\n.pill::before { display: none; }\n.pill .dot {\n  width: 8px; height: 8px; border-radius: 0;\n  background: var(--red);\n  animation: blink 1.2s steps(2, end) infinite;\n}\n@keyframes blink { 50% { opacity: .2; } }\n\n.h1 {\n  margin: 0 0 28px;\n  line-height: .88;\n  font-weight: 900;\n  letter-spacing: -.05em;\n  text-transform: uppercase;\n}\n.h1-1 {\n  display: block;\n  font-size: clamp(28px, 3.5vw, 48px);\n  font-weight: 700;\n  letter-spacing: .1em;\n  color: var(--ink-mute);\n  margin-bottom: 6px;\n  text-transform: uppercase;\n}\n.h1-2 {\n  display: block;\n  font-size: clamp(90px, 16vw, 220px);\n  font-weight: 900;\n  letter-spacing: -.06em;\n  line-height: .85;\n  color: var(--red);\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  filter: none;\n}\n.h1-3 {\n  display: block;\n  font-size: clamp(46px, 7vw, 110px);\n  font-weight: 400;\n  line-height: .92;\n  margin-top: 4px;\n  color: var(--ink);\n}\n.h1-3 em {\n  font-family: var(--f-s);\n  color: var(--ink);\n  letter-spacing: -.02em;\n}\n\n.hero-lede {\n  margin: 0 0 32px;\n  font-family: var(--f-s);\n  font-size: clamp(20px, 2vw, 26px);\n  line-height: 1.4;\n  color: var(--ink-soft);\n  max-width: 54ch;\n  text-wrap: pretty;\n}\n.hero-lede em { color: var(--red-hot); }\n\n.hero-cta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }\n\n.hero-stats {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  padding: 0;\n  border: 1px solid var(--rule);\n  background: var(--panel);\n  border-radius: 0;\n}\n.hero-stats::before { display: none; }\n.hs-cell {\n  display: flex; flex-direction: column; gap: 4px;\n  padding: 14px 16px;\n  border-right: 1px solid var(--rule);\n}\n.hs-cell:last-child { border-right: 0; }\n.hs-k {\n  font-family: var(--f-m);\n  font-size: 14px;\n  letter-spacing: .12em;\n  color: var(--ink-mute);\n  text-transform: uppercase;\n}\n.hs-v {\n  font-family: var(--f-d);\n  font-size: 18px;\n  font-weight: 800;\n  letter-spacing: .02em;\n  color: var(--ink);\n}\n.hs-accent { background: var(--red); }\n.hs-accent .hs-k { color: rgba(255,255,255,.75); }\n.hs-accent .hs-v { color: #fff; background: none; -webkit-background-clip: initial; background-clip: initial; }\n\n/* Ruby orb — reduced, flat disc */\n.ruby-wrap {\n  position: absolute;\n  right: -80px;\n  top: 60px;\n  width: 520px;\n  height: 520px;\n  pointer-events: none;\n  z-index: 1;\n  opacity: .9;\n}\n.ruby-rings { position: absolute; inset: 0; animation: spin 180s linear infinite; }\n.ruby-rings svg { width: 100%; height: 100%; }\n@keyframes spin { to { transform: rotate(360deg); } }\n\n.ruby-orb { position: absolute; inset: 28%; border-radius: 50%; }\n.ruby-glow { display: none; }\n.ruby-core {\n  position: absolute; inset: 0;\n  border-radius: 50%;\n  background: var(--red);\n  box-shadow: 0 0 0 4px var(--bg), 0 0 0 5px var(--red);\n}\n.ruby-highlight { display: none; }\n\n.hero-meta {\n  position: absolute;\n  z-index: 3;\n  display: flex; flex-direction: column; gap: 6px;\n  font-family: var(--f-m);\n  font-size: 14px;\n  letter-spacing: .08em;\n  background: var(--panel);\n  border: 1px solid var(--rule);\n  padding: 10px 14px;\n}\n.hero-meta div { display: flex; gap: 10px; }\n.hero-meta span { color: var(--ink-mute); min-width: 32px; text-transform: uppercase; }\n.hero-meta strong { color: var(--ink); font-weight: 700; }\n.hero-meta.left { left: 28px; bottom: 40px; }\n.hero-meta.right { right: 28px; bottom: 40px; }\n.hero-meta.right div { justify-content: flex-end; }\n\n/* ═══════════ SECTIONS ═══════════ */\n.sec {\n  padding: 88px 28px;\n  max-width: 1400px;\n  margin: 0 auto;\n  position: relative;\n  border-bottom: 1px solid var(--rule);\n}\n.sh {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 20px;\n  align-items: baseline;\n  padding-bottom: 18px;\n  margin-bottom: 48px;\n  border-bottom: 2px solid var(--red);\n}\n.sh-idx {\n  font-family: var(--f-m);\n  font-size: 14px;\n  font-weight: 800;\n  letter-spacing: .2em;\n  color: var(--red);\n  padding: 4px 10px;\n  border: 1px solid var(--red);\n}\n.sh h2 {\n  margin: 0;\n  font-size: clamp(36px, 5.5vw, 72px);\n  font-weight: 900;\n  letter-spacing: -.04em;\n  line-height: .92;\n  text-transform: uppercase;\n}\n.sh h2 em {\n  font-family: var(--f-s);\n  font-weight: 400;\n  color: var(--red);\n  letter-spacing: -.02em;\n  text-transform: none;\n}\n.sh-tag {\n  font-family: var(--f-m);\n  font-size: 14px;\n  letter-spacing: .15em;\n  color: var(--ink-mute);\n  text-transform: uppercase;\n}\n\n/* ═══════════ BRIEFING ═══════════ */\n.brief {\n  display: grid;\n  grid-template-columns: 1.5fr 1fr;\n  gap: 20px;\n  align-items: start;\n}\n.brief-card { padding: 36px 40px; border-radius: 0; }\n.bc-head {\n  display: flex; align-items: flex-start; gap: 20px;\n  padding-bottom: 18px;\n  margin-bottom: 24px;\n  border-bottom: 1px solid var(--rule);\n}\n.bc-glyph { width: 56px; height: 28px; color: var(--red); flex-shrink: 0; margin-top: 4px; }\n.bc-meta { display: grid; gap          <\u002Fdiv>\n          <\u002Fdiv>\n\n          <p class=\"bc-p first\">\n            Agents, nos contrôleurs ont repéré un rayonnement inhabituel\n            provenant d'un astéroïde. On le surnomme déjà le\n            <em>Rubis Stellaire<\u002Fem>. Ce n'est pas une pierre ordinaire.\n          <\u002Fp>\n          <p class=\"bc-p\">\n            Investiguez la nature de l'aérolithe, confirmez la présence\n            d'installations, et rendez compte. Discrétion maximale.\n            L'Union s'y intéresse aussi, et depuis un moment.\n          <\u002Fp>\n          <p class=\"bc-p\">\n            Départ à la première heure. Embarquement à bord du\n            <em>Tranchant<\u002Fem>. Récompense déposée à la livraison.\n          <\u002Fp>\n\n          <footer class=\"bc-foot\">\n            <span>— Cpt. Mardova<\u002Fspan>\n            <span>//  FIN_TRANS<\u002Fspan>\n          <\u002Ffooter>\n        <\u002Farticle>\n\n        <aside class=\"obj glass\">\n          <div class=\"obj-head\">\n            <span>Objectifs<\u002Fspan>\n            <span class=\"obj-chip\">05<\u002Fspan>\n          <\u002Fdiv>\n          <ol class=\"obj-list\">\n            <li>\n              <span class=\"obj-num\">01<\u002Fspan>\n              <span>Investiguer l'aérolithe et ses radiations anormales.<\u002Fspan>\n            <\u002Fli>\n            <li>\n              <span class=\"obj-num\">02<\u002Fspan>\n              <span>Confirmer la présence d'installations Unies.<\u002Fspan>\n            <\u002Fli>\n            <li>\n              <span class=\"obj-num\">03<\u002Fspan>\n              <span>Rétablir les communications avec la Réforme.<\u002Fspan>\n            <\u002Fli>\n            <li>\n              <span class=\"obj-num\">04<\u002Fspan>\n              <span>Déclencher l'auto-destruction de la base.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"danger\">\n              <span class=\"obj-num\">!!<\u002Fspan>\n              <span>Devancer l'escouade Unie. Rester en vie.<\u002Fspan>\n            <\u002Fli>\n          <\u002Fol>\n          <div class=\"obj-foot\" style=\"padding: 32px 24px 10px\">\n            <span style=\"font-size: 30px\">Récompense<\u002Fspan>\n            <strong style=\"font-size: 50px\">150 000 ₡<\u002Fstrong>\n          <\u002Fdiv>\n        <\u002Faside>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═══════════ UNIVERS ═══════════ -->\n    <section class=\"sec\" id=\"univers\">\n      <div class=\"sh\">\n        <span class=\"sh-idx\">02<\u002Fspan>\n        <h2>Une galaxie <em>divisée<\u002Fem><\u002Fh2>\n        <span class=\"sh-tag\">Trilogie de l'Union · 2245<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"factions\">\n        <article class=\"fac glass\">\n          <div class=\"fac-crest\">\n            <svg viewBox=\"0 0 100 100\" aria-hidden=\"true\">\n              <circle cx=\"50\" cy=\"50\" r=\"44\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fcircle>\n              <path d=\"M50 14 L56 42 L84 50 L56 58 L50 86 L44 58 L16 50 L44 42 Z\" fill=\"currentColor\"><\u002Fpath>\n              <circle cx=\"50\" cy=\"50\" r=\"3\" fill=\"#0a0608\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"fac-name\">Union de l'Enihil<\u002Fdiv>\n          <p class=\"fac-lede\">\n            Théocratie guidée par le Créateur. L'<em>Enihil<\u002Fem>,\n            qui aurait sauvé l'Humanité lors de l'Exode depuis Eden.\n          <\u002Fp>\n          <ul class=\"fac-keys\">\n            <li><span>Credo<\u002Fspan><strong>Un destin commun<\u002Fstrong><\u002Fli>\n            <li><span>Pouvoir<\u002Fspan><strong>Dogme · Contrôle<\u002Fstrong><\u002Fli>\n            <li><span>Signature<\u002Fspan><strong>Or · Ivoire<\u002Fstrong><\u002Fli>\n          <\u002Ful>\n        <\u002Farticle>\n\n\n        <article class=\"fac glass ref\">\n          <div class=\"fac-crest\">\n            <svg viewBox=\"0 0 100 100\" aria-hidden=\"true\">\n
